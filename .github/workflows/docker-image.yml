name: Docker Image CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io

jobs:
  build-aspnet-10:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the Docker image for ASP.NET 10
        run: docker buildx build --platform linux/amd64,linux/arm64 --no-cache --push -t ${{ env.REGISTRY }}/csrakowski/aspnet:10-alpine-$(date +%s) -t ${{ env.REGISTRY }}/csrakowski/aspnet:10-alpine ./docker/aspnet/10/

  build-aspnet-9:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

